function flatten(node,depth=0,parent=null){const nodes=[],links=[];const n={...node,depth,parentId:parent?parent.id:null,_children:node.children||[]};delete n.children;nodes.push(n);if(node.children){node.children.forEach(child=>{links.push({source:node.id,target:child.id});const sub=flatten(child,depth+1,node);nodes.push(...sub.nodes);links.push(...sub.links);});}return{nodes,links};}
const{nodes:allNodes,links:allLinks}=flatten(data);
let expandedCluster=null;

function getVisible(){
  if(expandedCluster){
    const cn=allNodes.find(n=>n.id===expandedCluster);
    const cids=new Set();
    (function go(id){allNodes.filter(n=>n.parentId===id).forEach(ch=>{cids.add(ch.id);go(ch.id);})})(expandedCluster);
    const bid=cn.parentId;
    const vN=allNodes.filter(n=>n.depth<=1||n.id===expandedCluster||cids.has(n.id)||(n.parentId===bid&&n.depth===2));
    const ids=new Set(vN.map(n=>n.id));
    return{vNodes:vN,vLinks:allLinks.filter(l=>ids.has(l.source.id||l.source)&&ids.has(l.target.id||l.target))};
  }
  const vN=allNodes.filter(n=>n.depth<=2);
  const ids=new Set(vN.map(n=>n.id));
  return{vNodes:vN,vLinks:allLinks.filter(l=>ids.has(l.source.id||l.source)&&ids.has(l.target.id||l.target))};
}

let sim,hoveredId=null;

function pillSize(d){
  if(d.depth===0)return{w:190,h:58};
  const lines=d.label.split('\n');const ml=Math.max(...lines.map(l=>l.length));
  if(d.depth===1)return{w:Math.max(ml*11+44,170),h:lines.length*22+30};
  return{w:Math.max(ml*7.8+30,110),h:lines.length*16+22};
}

function dotSize(d){
  const txt=d.short||'';const lines=txt.split('\n');
  const ml=Math.max(...lines.map(l=>l.length));
  const w=Math.max(ml*6.5+24,66);const h=lines.length*13+20;
  return{w,h,r:Math.max(w,h)/2};
}

function collisionR(d){
  if(d.depth>=3)return dotSize(d).r+6;
  const s=pillSize(d);return Math.max(s.w,s.h)/2+10;
}

function render(){
  const{vNodes,vLinks}=getVisible();
  vNodes.forEach(n=>{if(n.depth===0){n.fx=W/2;n.fy=H/2;}});
  if(sim)sim.stop();
  sim=d3.forceSimulation(vNodes)
    .force('link',d3.forceLink(vLinks).id(d=>d.id).distance(d=>{const s=allNodes.find(n=>n.id===(d.source.id||d.source));if(!s)return 100;if(s.depth===0)return 250;if(s.depth===1)return 150;if(s.depth===2)return 95;return 50;}).strength(d=>{const s=allNodes.find(n=>n.id===(d.source.id||d.source));return s&&s.depth===2?0.9:s&&s.depth===0?0.35:0.5;}))
    .force('charge',d3.forceManyBody().strength(d=>d.depth===0?-2500:d.depth===1?-900:d.depth>=3?-80:-300))
    .force('center',d3.forceCenter(W/2,H/2).strength(0.008))
    .force('collision',d3.forceCollide().radius(collisionR).strength(0.85))
    .force('x',d3.forceX(W/2).strength(0.005))
    .force('y',d3.forceY(H/2).strength(0.005));

  g.selectAll('.link').remove();
  g.selectAll('.node-g').remove();

  g.selectAll('.link').data(vLinks,d=>(d.source.id||d.source)+'-'+(d.target.id||d.target))
    .join('line').attr('class','link')
    .attr('stroke',d=>{const t=allNodes.find(n=>n.id===(d.target.id||d.target));if(t&&t.depth>=3)return dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.04)';if(t&&t.depth===2)return dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';return dark?'rgba(255,255,255,0.14)':'rgba(0,0,0,0.1)';})
    .attr('stroke-width',d=>{const s=allNodes.find(n=>n.id===(d.source.id||d.source));if(s&&s.depth===0)return 2.5;if(s&&s.depth===1)return 1.5;return 0.7;});

  const nodeSel=g.selectAll('.node-g').data(vNodes,d=>d.id).join('g').attr('class','node-g');

  nodeSel.filter(d=>d.depth<=1).attr('cursor','grab')
    .call(d3.drag().on('start',ds).on('drag',dd).on('end',de));

  nodeSel.filter(d=>d.depth===2&&d._children.length>0).attr('cursor','pointer');

  nodeSel.each(function(d){
    const el=d3.select(this);
    const dimmed=expandedCluster&&d.depth===2&&d.id!==expandedCluster;
    const op=dimmed?0.2:1;

    if(d.depth>=3){
      const ds2=dotSize(d);
      const tc=typeColors[d.otype||'research'];
      const isResearch=(d.otype||'research')==='research';

      if(isResearch){
        el.append('circle').attr('r',ds2.r)
          .attr('fill',tc.fill).attr('stroke',tc.stroke).attr('stroke-width',1)
          .attr('data-dot','1');
      } else {
        const rw=ds2.w,rh=ds2.h;
        el.append('rect').attr('x',-rw/2).attr('y',-rh/2)
          .attr('width',rw).attr('height',rh).attr('rx',8)
          .attr('fill',tc.fill).attr('stroke',tc.stroke).attr('stroke-width',1.5)
          .attr('data-dot','1');
      }

      if(d.short){
        const lines=d.short.split('\n');const lh=12;
        const sy=-(lines.length-1)*lh/2;
        lines.forEach((line,i)=>{
          el.append('text').attr('class','node-label')
            .attr('text-anchor','middle').attr('dominant-baseline','central')
            .attr('y',sy+i*lh).attr('fill',tc.text)
            .attr('font-size','9px').attr('font-weight',400).text(line);
        });
      }
      return;
    }

    const s=pillSize(d);
    const rx=d.depth===0?29:d.depth===1?22:14;
    const sw=d.depth===0?2:d.depth===1?1.2:(expandedCluster===d.id?1.5:0.5);
    el.append('rect').attr('x',-s.w/2).attr('y',-s.h/2)
      .attr('width',s.w).attr('height',s.h).attr('rx',rx)
      .attr('fill',c(d.cat,'fill')).attr('stroke',c(d.cat,'stroke'))
      .attr('stroke-width',sw).attr('opacity',op);

    const lines=d.label.split('\n');
    const fs=d.depth===0?18:d.depth===1?14:11;
    const lh=d.depth===0?24:d.depth===1?20:15;
    const sy=-(lines.length-1)*lh/2;
    lines.forEach((line,i)=>{
      el.append('text').attr('class','node-label')
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('y',sy+i*lh).attr('fill',c(d.cat,'text'))
        .attr('font-size',fs+'px').attr('font-weight',d.depth<=1?500:400)
        .attr('opacity',op).text(line);
    });

    if(d.depth===2&&d._children.length>0){
      const bx=s.w/2-2,by=-s.h/2-5;
      el.append('circle').attr('cx',bx).attr('cy',by).attr('r',10)
        .attr('fill',c(d.cat,'stroke')).attr('opacity',op);
      el.append('text').attr('class','node-label').attr('x',bx).attr('y',by)
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('fill',c(d.cat,'fill')).attr('font-size','10px').attr('font-weight',500)
        .attr('opacity',op).text(d._children.length);
    }
  });

  const linkSel=g.selectAll('.link');

  // ── Cross-branch arcs ──
  crossG.selectAll('.cross-arc').remove();
  const visibleIds=new Set(vNodes.map(n=>n.id));

  // Helper: find the ancestor at a given depth
  function ancestor(nodeId,targetDepth){
    let n=allNodes.find(x=>x.id===nodeId);
    while(n&&n.depth>targetDepth)n=allNodes.find(x=>x.id===n.parentId);
    return n;
  }

  // Resolve each cross-link to visible endpoint pairs
  const resolvedCross=[];
  crossLinks.forEach(cl=>{
    const fromNode=allNodes.find(n=>n.id===cl.from);
    const toNode=allNodes.find(n=>n.id===cl.to);
    if(!fromNode||!toNode)return;

    // Determine what's actually visible for each endpoint
    let fromVis=null,toVis=null;

    // If the exact node is visible, use it
    if(visibleIds.has(cl.from)) fromVis=cl.from;
    else{
      // Walk up to find nearest visible ancestor (cluster or domain)
      const c2=ancestor(cl.from,2);
      if(c2&&visibleIds.has(c2.id)) fromVis=c2.id;
      else{const c1=ancestor(cl.from,1);if(c1&&visibleIds.has(c1.id))fromVis=c1.id;}
    }

    if(visibleIds.has(cl.to)) toVis=cl.to;
    else{
      const c2=ancestor(cl.to,2);
      if(c2&&visibleIds.has(c2.id)) toVis=c2.id;
      else{const c1=ancestor(cl.to,1);if(c1&&visibleIds.has(c1.id))toVis=c1.id;}
    }

    if(!fromVis||!toVis||fromVis===toVis)return;

    // Determine domain cats for gradient
    const fNode=allNodes.find(n=>n.id===fromVis);
    const tNode=allNodes.find(n=>n.id===toVis);
    if(!fNode||!tNode)return;

    const fCat=fNode.cat||'root';
    const tCat=tNode.cat||'root';

    // Check if either endpoint is a leaf (depth 3) — sharper arc
    const isLeafLevel=(fNode.depth>=3||tNode.depth>=3);

    resolvedCross.push({
      fromId:fromVis, toId:toVis,
      fromCat:fCat, toCat:tCat,
      label:cl.label,
      isLeafLevel
    });
  });

  // Deduplicate: if multiple cross-links resolve to same visible pair, keep one
  const seen=new Set();
  const uniqueCross=resolvedCross.filter(rc=>{
    const key=[rc.fromId,rc.toId].sort().join('|');
    if(seen.has(key))return false;
    seen.add(key);return true;
  });

  const arcSel=crossG.selectAll('.cross-arc').data(uniqueCross,d=>d.fromId+'~'+d.toId)
    .join('path').attr('class','cross-arc')
    .attr('fill','none')
    .attr('stroke',d=>`url(#cg-${d.fromCat}-${d.toCat})`)
    .attr('stroke-width',d=>d.isLeafLevel?1.8:1.2)
    .attr('stroke-dasharray',d=>d.isLeafLevel?'6 4':'8 6')
    .attr('opacity',d=>{
      if(!expandedCluster)return dark?0.35:0.25;
      // When a cluster is expanded, brighten arcs touching the expanded cluster's children
      return d.isLeafLevel?(dark?0.65:0.5):(dark?0.15:0.1);
    })
    .style('pointer-events','none');

  // Arc path generator: quadratic bezier with control point offset perpendicular to midpoint
  function arcPath(x1,y1,x2,y2){
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const dx=x2-x1, dy=y2-y1;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    // Offset perpendicular to the line, scaled by distance
    const bulge=Math.min(dist*0.3,120);
    // Perpendicular unit vector (rotate 90°)
    const px=-dy/dist, py=dx/dist;
    const cx=mx+px*bulge, cy=my+py*bulge;
    return`M${x1},${y1} Q${cx},${cy} ${x2},${y2}`;
  }

  sim.on('tick',()=>{
    linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);

    // Update cross-link arcs
    arcSel.each(function(d){
      const fn=vNodes.find(n=>n.id===d.fromId);
      const tn=vNodes.find(n=>n.id===d.toId);
      if(!fn||!tn||isNaN(fn.x)||isNaN(tn.x))return;
      d3.select(this).attr('d',arcPath(fn.x,fn.y,tn.x,tn.y));

      // Update gradient endpoints for proper directional color
      const grad=defs.select(`#cg-${d.fromCat}-${d.toCat}`);
      if(!grad.empty()){
        grad.attr('x1',fn.x).attr('y1',fn.y).attr('x2',tn.x).attr('y2',tn.y);
      }
    });
  });
  if(expandedCluster)sim.alpha(0.8).restart();
}

const ttGroup=svg.append('g').attr('id','tt-group').style('pointer-events','none').style('display','none');
const ttBg=ttGroup.append('rect').attr('rx',6).attr('fill',dark?'#2c2c2a':'#fff').attr('stroke',dark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.15)').attr('stroke-width',1);
const ttTitle=ttGroup.append('text').attr('font-size','12px').attr('font-weight',500).attr('fill',dark?'#e8e6de':'#2c2c2a');
const ttVenue=ttGroup.append('text').attr('font-size','11px').attr('fill',dark?'#b4b2a9':'#5f5e5a');
const ttCoauth=ttGroup.append('text').attr('font-size','11px').attr('fill',dark?'#888780':'#888780');

document.addEventListener('pointermove',function(e){
  const gEl=g.node();
  const dbg=document.getElementById('dbg');
  let svgPt;
  try{
    const pt=svgEl.createSVGPoint();
    pt.x=e.clientX;pt.y=e.clientY;
    svgPt=pt.matrixTransform(gEl.getScreenCTM().inverse());
  }catch(err){dbg.textContent='CTM error';return;}

  let found=null;
  const dots=allNodes.filter(n=>n.depth>=3&&typeof n.x==='number'&&!isNaN(n.x));
  dbg.textContent='dots:'+dots.length+' svgXY:'+Math.round(svgPt.x)+','+Math.round(svgPt.y);
  for(const d of dots){
    const ds2=dotSize(d);
    const dx=svgPt.x-d.x,dy=svgPt.y-d.y;
    const isResearch=(d.otype||'research')==='research';
    if(isResearch){
      const hr=ds2.r+10;
      if(dx*dx+dy*dy<hr*hr){found=d;break;}
    } else {
      const hw=ds2.w/2+10,hh=ds2.h/2+10;
      if(Math.abs(dx)<hw&&Math.abs(dy)<hh){found=d;break;}
    }
  }

  if(found){
    dbg.textContent='FOUND: '+found.short+' | dots:'+dots.length;
    if(found.id!==hoveredId){
      hoveredId=found.id;
      g.selectAll('[data-dot]').each(function(){
        const dd=d3.select(this.parentNode).datum();
        d3.select(this).attr('stroke-width',(dd.otype||'research')==='research'?1:1.5);
      });
      g.selectAll('.node-g').filter(dd=>dd.id===found.id).select('[data-dot]')
        .attr('stroke-width',3);
    }

    const title=found.label||'';
    const venue=found.venue?found.venue:'';
    const coauth=found.coauth?'w/ '+found.coauth:'';

    ttTitle.text(title);
    ttVenue.text(venue);
    ttCoauth.text(coauth);

    const tx=e.clientX+16;
    const ty=e.clientY-10;
    const lines=[title,venue,coauth].filter(Boolean);
    const maxChars=Math.max(...lines.map(l=>l.length));
    const boxW=Math.min(maxChars*7+24,320);
    const boxH=lines.length*18+16;

    ttBg.attr('x',0).attr('y',0).attr('width',boxW).attr('height',boxH);
    ttTitle.attr('x',12).attr('y',20);
    ttVenue.attr('x',12).attr('y',venue?38:0).style('display',venue?'block':'none');
    ttCoauth.attr('x',12).attr('y',coauth?(venue?56:38):0).style('display',coauth?'block':'none');

    const clampX=Math.min(tx,W-boxW-10);
    const clampY=Math.max(ty-boxH/2,8);
    ttGroup.attr('transform',`translate(${clampX},${clampY})`).style('display','block');
  } else if(hoveredId){
    hoveredId=null;
    ttGroup.style('display','none');
    g.selectAll('[data-dot]').each(function(){
      const dd=d3.select(this.parentNode).datum();
      d3.select(this).attr('stroke-width',(dd.otype||'research')==='research'?1:1.5);
    });
  }
});

let clickTimeout=null;
let pointerDownPos=null;
document.addEventListener('pointerdown',function(e){
  pointerDownPos={x:e.clientX,y:e.clientY};
});
document.addEventListener('pointerup',function(e){
  if(clickTimeout)return;
  clickTimeout=setTimeout(()=>{clickTimeout=null;},100);

  // If pointer moved more than 5px, it was a drag/pan — not a click
  if(pointerDownPos){
    const dx=e.clientX-pointerDownPos.x, dy=e.clientY-pointerDownPos.y;
    if(dx*dx+dy*dy>25){pointerDownPos=null;return;}
  }
  pointerDownPos=null;

  const gEl=g.node();
  let svgPt;
  try{
    const pt=svgEl.createSVGPoint();
    pt.x=e.clientX;pt.y=e.clientY;
    svgPt=pt.matrixTransform(gEl.getScreenCTM().inverse());
  }catch(err){return;}

  let clickedCluster=null;
  const clusters=allNodes.filter(n=>n.depth===2&&n._children.length>0&&typeof n.x==='number'&&!isNaN(n.x));
  for(const d of clusters){
    const s=pillSize(d);
    const hw=s.w/2+4,hh=s.h/2+4;
    if(Math.abs(svgPt.x-d.x)<hw&&Math.abs(svgPt.y-d.y)<hh){clickedCluster=d;break;}
  }

  if(clickedCluster){
    expandedCluster=expandedCluster===clickedCluster.id?null:clickedCluster.id;
    ttGroup.style('display','none');hoveredId=null;
    render();
    return;
  }

  const dots=allNodes.filter(n=>n.depth>=3&&typeof n.x==='number'&&!isNaN(n.x));
  for(const d of dots){
    const ds2=dotSize(d);
    const dx=svgPt.x-d.x,dy=svgPt.y-d.y;
    const isR=(d.otype||'research')==='research';
    if(isR){if(dx*dx+dy*dy<(ds2.r+6)*(ds2.r+6))return;}
    else{if(Math.abs(dx)<ds2.w/2+6&&Math.abs(dy)<ds2.h/2+6)return;}
  }

  if(expandedCluster){expandedCluster=null;ttGroup.style('display','none');hoveredId=null;render();}
});

function ds(e,d){if(!e.active)sim.alphaTarget(0.2).restart();d.fx=d.x;d.fy=d.y;}
function dd(e,d){d.fx=e.x;d.fy=e.y;}
function de(e,d){if(!e.active)sim.alphaTarget(0);if(d.depth===0)return;d.fx=null;d.fy=null;}

const leg=document.getElementById('legend');
leg.style.color=dark?'#b4b2a9':'#5f5e5a';
[{l:'Political violence',c:palette.pv.mid,t:'sq'},{l:'Illicit finance',c:palette.if.mid,t:'sq'},{l:'Int\'l development',c:palette.id.mid,t:'sq'},{l:'Methods & ethics',c:palette.me.mid,t:'sq'},{l:'Creative writing',c:palette.cw.mid,t:'sq'},
{l:'Research',c:typeColors.research.stroke,t:'circle'},{l:'Teaching',c:typeColors.teaching.stroke,t:'rrect'},{l:'Policy',c:typeColors.policy.stroke,t:'rrect'}
].forEach(d=>{
  const cls=d.t==='circle'?'leg-circle':d.t==='rrect'?'leg-rrect':'leg-sq';
  const style=d.t==='rrect'?`border-color:${d.c};background:transparent`:`background:${d.c}`;
  leg.innerHTML+=`<span><span class="${cls}" style="${style}"></span>${d.l}</span>`;
});

render();
</script>
</body>
